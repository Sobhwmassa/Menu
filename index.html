<head>

  <meta name="description" content="Authentic Lebanese cuisine since 2015 — Sobh w Massa.">

  <link rel="icon" href="assets/img/logo.jpeg" type="image/jpeg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    /* ---------- Tokens ---------- */
    :root {
      --maroon: #5a1a0d;
      --maroon-deep: #3f0f06;
      --beige: #fcfae0;
      --accent: #d4a857;

      --font-en: 'Montserrat', sans-serif;
      --font-ar-title: 'Gulzar', sans-serif;
      --font-ar-body: "Scheherazade New", serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-en);
      line-height: 1.5;
      background: var(--maroon);
      color: var(--beige);
      overflow-x: hidden;
    }



    /* ============= COVER (full-screen oven, like PDF page 1) ============= */
    .cover {
      position: relative;
      width: 100%;
      height: 100vh;
      background: url('assets/img/oven.jpeg') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .cover::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(63, 15, 6, 0.55) 0%, rgba(90, 26, 13, 0.55) 100%);
      z-index: 1;
    }
    .cover-inner {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
      animation: fadeUp 1.4s ease-out;
    }
    .cover-ar {
      font-family: var(--font-ar-title);
      font-size: clamp(4.5rem, 13vw, 8.5rem);
      color: var(--beige);
      line-height: 1;
      filter: drop-shadow(0 0 30px rgba(252,250,224,0.35));
    }
    .cover-sub-ar {
      font-family: var(--font-ar-body);
      font-size: clamp(0.85rem, 2vw, 1.1rem);
      color: var(--beige);
      letter-spacing: 0.25em;
      margin-top: 0.5rem;
      opacity: 0.92;
    }
    .cover-en {
      font-family: var(--font-en);
      font-size: clamp(2.5rem, 7vw, 4.2rem);
      font-weight: 300;
      letter-spacing: 0.03em;
      color: var(--beige);
      margin-top: 0.4rem;
      filter: drop-shadow(0 0 25px rgba(252,250,224,0.3));
    }
    .cover-since {
      font-family: var(--font-en);
      font-size: clamp(0.7rem, 1.5vw, 0.85rem);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--beige);
      opacity: 0.7;
      margin-top: 1.8rem;
    }
    .scroll-cue {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      color: var(--beige);
      opacity: 0.7;
      font-family: var(--font-en);
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      text-align: center;
      animation: bob 2.5s ease-in-out infinite;
    }
    .scroll-cue::after {
      content: ''; display: block;
      width: 1px; height: 32px;
      background: var(--beige);
      opacity: 0.7;
      margin: 0.8rem auto 0;
    }
    @keyframes bob {
      0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.5; }
      50%      { transform: translateX(-50%) translateY(8px); opacity: 1; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ============= FILTER BAR ============= */
    .filter-section {
      padding: 3rem 1.5rem 2rem;
      text-align: center;
      background: var(--maroon);
    }
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem 0.8rem;
      justify-content: center;
      max-width: 800px;
      margin: 0 auto;
    }
    .filter-btn {
      font-family: var(--font-en);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 0.55rem 1.3rem;
      border-radius: 999px;
      background: transparent;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
      border: 1.5px solid var(--beige);
      color: var(--beige);
    }
    .filter-btn.active {
      background: var(--beige);
      color: var(--maroon);
    }
    .filter-btn:hover:not(.active) {
      background: rgba(252,250,224,0.1);
    }

    /* ============= CATEGORY SECTION ============= */
    .category {
      padding: 4rem 1.5rem 5rem;
      animation: fadeIn 0.5s ease;
    }
    .category.hidden { display: none; }
    .category.theme-maroon { background: var(--maroon); color: var(--beige); }
    .category.theme-beige  { background: var(--beige);  color: var(--maroon); }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .category-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .category-title {
      text-align: center;
      margin-bottom: 3rem;
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .cat-en {
      font-family: var(--font-en);
      font-weight: 600;
      font-size: clamp(2rem, 4.5vw, 2.8rem);
    }
    .cat-ar {
      font-family: var(--font-ar-title);
      font-size: clamp(2.4rem, 5vw, 3.2rem);
      line-height: 1;
    }

    /* Sub-group inside category */
    .subgroup { margin-bottom: 2.8rem; }
    .subgroup-label {
      font-family: var(--font-en);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      opacity: 0.75;
      margin-bottom: 1.3rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid currentColor;
      display: inline-block;
      padding-right: 2.5rem;
    }

    /* Items grid */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 1.6rem 3rem;
    }

    .item {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      padding-bottom: 1rem;
    }
    .theme-maroon .item { border-bottom-color: rgba(252, 250, 224, 0.22); }
    .theme-beige  .item { border-bottom-color: rgba(90, 26, 13, 0.22); }

    .item-body { flex: 1; min-width: 0; }

    .item-name-en {
      font-family: var(--font-en);
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      line-height: 1.25;
    }
    .item-name-ar {
      font-family: var(--font-ar-body);
      font-size: 1rem;
      font-weight: 500;
      line-height: 1.4;
      direction: rtl;
      text-align: left;
      margin-top: 0.15rem;
      opacity: 0.9;
    }
    .item-desc {
      font-family: var(--font-en);
      font-size: 0.78rem;
      font-style: italic;
      font-weight: 300;
      opacity: 0.7;
      margin-top: 0.35rem;
      line-height: 1.45;
    }
    .item-desc-ar {
      font-family: var(--font-ar-body);
      font-size: 0.85rem;
      font-weight: 400;
      opacity: 0.7;
      margin-top: 0.2rem;
      line-height: 1.5;
      direction: rtl;
      text-align: left;
    }

    .item-price {
      font-family: var(--font-en);
      font-size: 1rem;
      font-weight: 700;
      white-space: nowrap;
      align-self: flex-start;
      padding-top: 0.1rem;
    }
    .theme-maroon .item-price { color: var(--beige); }
    .theme-beige  .item-price { color: var(--maroon); }

    /* ============= QUOTE SECTION ============= */
    .quote-section {
      padding: 5rem 1.5rem;
      background: var(--beige);
      color: var(--maroon);
    }
    .quote-inner {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 2rem;
    }
    .quote-section img {
      width: 100%;
      max-width: 380px;
      justify-self: center;
    }
    .quote-text-ar {
      font-family: var(--font-ar-body);
      font-size: clamp(1.2rem, 2.5vw, 1.7rem);
      line-height: 1.85;
      direction: rtl;
      text-align: right;
      padding: 0 1rem;
      color: var(--maroon);
      font-weight: 500;
    }
    .quote-text-en {
      font-family: var(--font-en);
      font-size: clamp(0.95rem, 1.6vw, 1.15rem);
      font-style: italic;
      line-height: 1.7;
      color: var(--maroon);
      opacity: 0.85;
      margin-top: 1rem;
      text-align: right;
      direction: rtl;
      padding: 0 1rem;
    }

    /* Spread banner */
    .spread-banner {
      width: 100%;
      max-height: 70vh;
      overflow: hidden;
      background: var(--maroon-deep);
    }
    .spread-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ============= FOOTER (wood-like, evoking PDF last page) ============= */
    footer {
      background: var(--maroon-deep);
      color: var(--beige);
      padding: 4rem 1.5rem 2rem;
      text-align: center;
      position: relative;
    }
    footer::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        90deg,
        rgba(0, 0, 0, 0.12) 0px,
        rgba(0, 0, 0, 0.12) 1px,
        transparent 1px,
        transparent 60px
      );
      pointer-events: none;
      opacity: 0.5;
    }
    footer > * { position: relative; z-index: 1; }

    .footer-ar {
      font-family: var(--font-ar-title);
      font-size: 3rem;
      line-height: 1;
      margin-bottom: 0.3rem;
      filter: drop-shadow(0 0 20px rgba(252,250,224,0.3));
    }
    .footer-en {
      font-family: var(--font-en);
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      margin-bottom: 0.6rem;
    }
    .footer-since {
      font-family: var(--font-en);
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      opacity: 0.7;
      margin-bottom: 2.5rem;
    }
    .socials {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      margin-bottom: 2rem;
    }
    .socials a {
      width: 42px; height: 42px;
      border: 1px solid var(--beige);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--beige);
      text-decoration: none;
      transition: all 0.3s;
      opacity: 0.85;
    }
    .socials a:hover {
      background: var(--beige);
      color: var(--maroon);
      opacity: 1;
    }
    .socials svg { width: 18px; height: 18px; }
    .copyright {
      font-family: var(--font-en);
      font-size: 0.75rem;
      opacity: 0.7;
    }
    .credits {
      font-family: var(--font-en);
      font-size: 0.7rem;
      opacity: 0.55;
      margin-top: 0.4rem;
    }

    /* Back to top */
    .back-to-top {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 44px;
      height: 44px;
      background: var(--beige);
      color: var(--maroon);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      font-weight: 700;
      box-shadow: 0 6px 22px rgba(0, 0, 0, 0.4);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s;
      z-index: 50;
    }
    
    .back-to-top.visible { opacity: 1; pointer-events: auto; }
    .back-to-top:hover { transform: translateY(-3px); }

    /* Responsive */
    @media (max-width: 768px) {
      .items-grid { grid-template-columns: 1fr; gap: 1.3rem; }
      .quote-inner { grid-template-columns: 1fr; text-align: center; }
      .quote-section img { max-width: 260px; }
      .quote-text-ar, .quote-text-en { text-align: center; padding: 0; }
      .category { padding: 3rem 1.2rem; }
      .filter-btn { padding: 0.45rem 1rem; font-size: 0.72rem; }
      .footer-ar { font-size: 2.5rem; }
    }
  </style>
</head>

    function itemHTML(item) {
      return `
        <div class="item">
          <div class="item-body">
            <div class="item-name-en">${item.en}</div>
            <div class="item-name-ar">${item.ar}</div>
            ${item.desc ? `<div class="item-desc">${item.desc}</div>` : ''}
            ${item.desc_ar ? `<div class="item-desc-ar">${item.desc_ar}</div>` : ''}
          </div>
          <div class="item-price">${item.price}</div>
        </div>
      `;
    }

    function renderCategory(catKey) {
      const container = document.getElementById(catKey + '-content');
      if (!container) return;
      const groups = menu[catKey] || {};
      const groupKeys = Object.keys(groups);
      const skipLabel = groupKeys.length === 1;
      container.innerHTML = groupKeys.map(label => `
        <div class="subgroup">
          ${skipLabel ? '' : `<div class="subgroup-label">${label}</div>`}
          <div class="items-grid">${groups[label].map(itemHTML).join('')}</div>
        </div>
      `).join('');
    }

    Object.keys(menu).forEach(renderCategory);

    // Filter logic
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.getAttribute('data-filter');

        document.querySelectorAll('.category').forEach(cat => {
          if (filter === 'all' || cat.getAttribute('data-cat') === filter) {
            cat.classList.remove('hidden');
          } else {
            cat.classList.add('hidden');
          }
        });

        const quote = document.getElementById('quoteSection');
        const banner = document.getElementById('spreadBanner');
        if (filter === 'all') {
          quote.style.display = '';
          banner.style.display = '';
        } else {
          quote.style.display = 'none';
          banner.style.display = 'none';
        }

        document.getElementById('filterBar').scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });

    // Back to top
    const backBtn = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 600) backBtn.classList.add('visible');
      else backBtn.classList.remove('visible');
    });
    backBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  </script>
